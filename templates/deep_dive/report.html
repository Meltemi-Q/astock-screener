<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>个股深度研报 | 五层选股</title>
<link rel="stylesheet" href="assets/deep_dive.css">
</head><body>
<div class="container" id="app">
  <header>
    <a id="backLink" href="../astock_screen_20260627.html" class="back">← 回到选股总表</a>
    <h1 id="title">加载中</h1>
    <div class="sub" id="subtitle"></div>
  </header>
  <div id="status" class="status">正在加载研报数据…</div>
  <div id="content" hidden>
    <div class="kpis" id="kpis"></div>
    <div class="quant-summary" id="quantSummary"></div>

    <div class="section">
      <h2>股价走势 (前复权)</h2>
      <div class="kline-bar">
        <button class="on" data-period="day">日K</button>
        <button data-period="week">周K</button>
        <button data-period="month">月K</button>
        <span class="ma-legend">
          MA5 <span class="ma5">──</span>
          MA10 <span class="ma10">──</span>
          MA20 <span class="ma20">──</span>
          MA60 <span class="ma60">──</span>
        </span>
      </div>
      <canvas id="cvKline"></canvas>
    </div>

    <div class="section">
      <h2>5年财务趋势</h2>
      <canvas id="cvTrend"></canvas>
    </div>

    <div class="section">
      <h2>历年财务数据</h2>
      <div class="table-wrap">
        <table class="fin-table">
          <thead><tr>
            <th class="l">年度</th><th>营收(亿)</th><th>净利(亿)</th><th>ROE%</th><th>毛利%</th><th>净利率%</th>
            <th>ROA%</th><th>负债%</th><th>EPS</th><th>经营现金流</th><th>现金流/净利</th>
          </tr></thead>
          <tbody id="financialRows"></tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <h2 id="peerTitle">同行对比</h2>
      <table class="peer-table">
        <thead><tr>
          <th>#</th><th>代码/名称</th><th>PE</th><th>ROE%</th><th>毛利%</th><th>市值(亿)</th><th>评级</th>
        </tr></thead>
        <tbody id="peerRows"></tbody>
      </table>
    </div>

    <div id="analysisBlock"></div>

    <footer id="footer"></footer>
  </div>
</div>
<script src="assets/deep_dive.js"></script>
</body></html>
