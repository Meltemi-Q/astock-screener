<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>可转债深度分析</title>
<link rel="stylesheet" href="assets/cbond_deep.css">
</head><body>
<div class="container" id="app">
  <header>
    <nav class="report-nav">
      <a class="back" href="../cbond_double_low.html">← 双低筛选</a>
      <a class="back muted" href="index.html">深度索引</a>
      <button id="themeToggle" class="back muted" type="button" title="切换暗色/亮色主题">🌙 暗色</button>
    </nav>
    <h1 id="title">加载中</h1>
    <div class="sub" id="subtitle"></div>
  </header>
  <div id="status" class="status">正在加载可转债数据…</div>
  <div id="content" hidden>
    <div class="kpis" id="kpis"></div>
    <div class="decision-band" id="decisionBand"></div>

    <div class="section">
      <h2>价格走势</h2>
      <div class="chart-toolbar">
        <div class="seg" id="assetSwitch">
          <button class="on" data-asset="bond">转债</button>
          <button data-asset="stock">正股</button>
        </div>
        <div class="seg" id="periodSwitch">
          <button class="on" data-period="day">日K</button>
          <button data-period="week">周K</button>
          <button data-period="month">月K</button>
        </div>
        <span class="ma-legend">MA5 <span class="ma5">──</span> MA10 <span class="ma10">──</span> MA20 <span class="ma20">──</span></span>
      </div>
      <canvas id="cvKline"></canvas>
    </div>

    <div class="section grid-2">
      <div>
        <h2>策略评分</h2>
        <div id="scoreGrid" class="score-grid"></div>
      </div>
      <div>
        <h2>排雷与交易纪律</h2>
        <div id="riskBox" class="risk-box"></div>
      </div>
    </div>

    <div class="section">
      <h2>正股近年财务</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th class="l">年度</th><th>营收(亿)</th><th>净利(亿)</th><th>ROE%</th><th>毛利%</th><th>净利率%</th><th>负债%</th><th>现金流/净利</th></tr></thead>
          <tbody id="financialRows"></tbody>
        </table>
      </div>
    </div>

    <div id="analysisBlock"></div>
    <footer id="footer"></footer>
  </div>
</div>
<script src="assets/cbond_deep.js"></script>
</body></html>
